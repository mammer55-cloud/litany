<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Litany</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Amiri&display=swap');
        
        :root { --gold: #f39c12; --glass: rgba(255, 255, 255, 0.1); --text: #ffffff; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; transition: background 2s ease, color 1s ease; background: #0a0a0c; color: var(--text); overflow: hidden; }

        /* Sky Engine Orbs */
        .orb { position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.3; transition: all 3s ease; }
        
        /* Navigation (Auto-hiding) */
        .nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; display: flex; background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(25px); padding: 12px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; transition: 0.5s; }
        .nav.hidden { transform: translate(-50%, 150px); opacity: 0; pointer-events: none; }
        .nav button { flex: 1; background: none; border: none; color: inherit; opacity: 0.4; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; cursor: pointer; }
        .nav button.active { opacity: 1; color: var(--gold); }

        /* Pages */
        .page { display: none; height: 100vh; overflow-y: auto; padding: 40px 20px 140px 20px; box-sizing: border-box; }
        .page.active { display: block; }

        /* GUI Modals */
        .gui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-card { background: rgba(30,30,30,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 35px; width: 100%; max-width: 400px; text-align: center; }

        .time-block { background: var(--glass); padding: 15px; border-radius: 20px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.15); cursor: pointer; transition: 0.2s; }
        .time-block:hover { border-color: var(--gold); background: rgba(243, 156, 18, 0.1); }

        /* Cards */
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .arabic { font-family: 'Amiri', serif; font-size: 2.2rem; direction: rtl; text-align: center; margin: 15px 0; line-height: 1.8; }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 20px; font-weight: 600; width: 100%; cursor: pointer; }

        /* Immersive Player */
        #player-view { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .dhikr-row { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; scroll-snap-align: center; opacity: 0.1; transition: 0.8s; text-align: center; }
        .dhikr-row.active { opacity: 1; transform: scale(1.05); }
        .center-line { position: fixed; top: 50%; left: 15%; width: 70%; height: 1px; background: var(--gold); opacity: 0.3; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div class="orb" id="sky-orb-1" style="top: -10%; right: -10%;"></div>
    <div class="orb" id="sky-orb-2" style="bottom: -10%; left: -10%;"></div>

    <div id="observation-modal" class="gui-overlay">
        <div class="modal-card">
            <h2 style="font-weight: 200;">Which observation?</h2>
            <div id="timing-blocks"></div>
            <div class="time-block" onclick="finalizeSessionStart('Freestyle')">
                <span style="color: var(--gold);">+ Freestyle</span>
            </div>
            <button onclick="closeObservation()" style="background:none; border:none; color:white; margin-top:20px; opacity:0.5;">Cancel</button>
        </div>
    </div>

    <div id="resume-modal" class="gui-overlay">
        <div class="modal-card">
            <h2 style="font-weight: 200;">Resume Session?</h2>
            <p id="resume-text" style="opacity:0.6; font-size:0.9rem;"></p>
            <button class="btn-main" onclick="executeResume()">Resume Now</button>
            <button class="btn-main" style="background:rgba(255,255,255,0.1); color:white; margin-top:10px;" onclick="abortSession()">Start Fresh</button>
        </div>
    </div>

    <div id="home" class="page active">
        <h1 style="font-weight: 200;">My Litanies</h1>
        <p id="prayer-status" style="opacity: 0.5; font-size: 0.8rem;">Syncing Lexington sun...</p>
        <div id="roster-list"></div>
    </div>

    <div id="shop" class="page">
        <h1 style="font-weight: 200;">Shop</h1>
        <div id="shop-list"></div>
    </div>

    <div id="settings" class="page">
        <h1 style="font-weight: 200;">Settings</h1>
        <div class="card">
            <h3>Debug Sky</h3>
            <input type="time" id="debug-time" onchange="updateSky(this.value)">
            <button class="btn-main" style="background:#333; color:white; margin-top:10px;" onclick="localStorage.removeItem('sky_override'); location.reload();">Reset</button>
        </div>
        <div id="session-history"></div>
    </div>

    <div id="player" class="page" style="padding: 0; background: black;">
        <div class="center-line"></div>
        <button onclick="exitPlayer()" style="position:fixed; top:30px; left:20px; z-index:2500; background:rgba(255,255,255,0.1); border:none; color:white; padding:10px 15px; border-radius:15px; backdrop-filter:blur(10px);">✕ Exit</button>
        <div id="player-view"></div>
    </div>

    <nav class="nav" id="main-nav">
        <button id="nav-home" class="active" onclick="showPage('home')">Litanies</button>
        <button id="nav-shop" onclick="showPage('shop')">Shop</button>
        <button id="nav-settings" onclick="showPage('settings')">Settings</button>
    </nav>

    <script>
        const SB_URL = "https://qtmbkihjgdtdzjafcpji.supabase.co";
        const SB_KEY = "sb_publishable_v2c41Jbqj-xNtdLMdM__zA_zYc5iQxb";
        const client = supabase.createClient(SB_URL, SB_KEY);
        let activeSession = null, currentLitanyData = null, currentMode = null;

        async function updateSky(overrideTime = null) {
            if(overrideTime) localStorage.setItem('sky_override', overrideTime);
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=2`);
                const { data } = await res.json();
                const now = new Date();
                const time = overrideTime || `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
                
                const t = (h, m) => parseInt(h) * 60 + parseInt(m);
                const curM = t(...time.split(':'));
                const fajrM = t(...data.timings.Fajr.split(':')), maghribM = t(...data.timings.Maghrib.split(':')), ishaM = t(...data.timings.Isha.split(':'));

                let bg, orb1, orb2, textColor = "#fff";

                if (curM >= fajrM && curM < t(12,0)) { // Morning
                    bg = "linear-gradient(180deg, #FFF9E6 0%, #FFFFFF 100%)";
                    orb1 = "#FFD700"; orb2 = "#87CEEB"; textColor = "#2d3436";
                } else if (curM >= t(12,0) && curM < maghribM) { // Afternoon
                    bg = "linear-gradient(180deg, #FFEFBA 0%, #FFF9E6 100%)";
                    orb1 = "#f39c12"; orb2 = "#FFFFFF"; textColor = "#2d3436";
                } else if (curM >= maghribM && curM < ishaM) { // Sunset
                    bg = "linear-gradient(180deg, #4B0082 0%, #FF4500 100%)";
                    orb1 = "#FF6347"; orb2 = "#4834d4";
                } else { // Night
                    bg = "#0a0a0c"; orb1 = "#1a1a2e"; orb2 = "#4834d4";
                }

                document.body.style.background = bg;
                document.body.style.color = textColor;
                document.getElementById('sky-orb-1').style.background = orb1;
                document.getElementById('sky-orb-2').style.background = orb2;
            });
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const nav = document.getElementById('nav-' + id);
            if(nav) nav.classList.add('active');
            if(id === 'home') loadRoster(); else if(id === 'shop') loadShop(); else if(id === 'settings') loadHistory();
        }

        async function loadRoster() {
            const { data } = await client.from('litanies').select('*, litany_structure(id)');
            document.getElementById('roster-list').innerHTML = data.map(l => `
                <div class="card">
                    <h2 style="font-weight:200;">${l.name}</h2>
                    <div style="display:flex; gap:12px;">
                        <button class="btn-main" onclick="initiateSession('${l.id}', 'flow')">🌊 Flow</button>
                        <button class="btn-main" style="background:rgba(255,255,255,0.1); color:white;" onclick="initiateSession('${l.id}', 'tap')">👆 Tap</button>
                    </div>
                </div>`).join('');
        }

        async function initiateSession(litId, mode) {
            currentMode = mode;
            const { data: sess } = await client.from('litany_sessions').select('*').eq('litany_id', litId).eq('is_completed', false).maybeSingle();
            if(sess) {
                activeSession = sess;
                document.getElementById('resume-text').innerText = `Resume "${sess.session_label}" in ${mode.toUpperCase()} mode?`;
                document.getElementById('resume-modal').style.display = 'flex';
                return;
            }
            // Show Observation GUI
            const { data: scheds } = await client.from('litany_schedules').select('*').eq('litany_id', litId);
            document.getElementById('timing-blocks').innerHTML = scheds.map(s => `
                <div class="time-block" onclick="finalizeSessionStart('${s.label}', '${litId}')">
                    <strong>${s.label}</strong> <br> <small>${s.time_hint}</small>
                </div>`).join('');
            document.getElementById('observation-modal').style.display = 'flex';
        }

        async function finalizeSessionStart(label, litId) {
            const { data } = await client.from('litany_sessions').insert({ litany_id: litId, mode: currentMode, session_label: label }).select().single();
            closeObservation();
            startPlayer(data);
        }

        async function startPlayer(session) {
            activeSession = session;
            const { data } = await client.from('litany_structure').select('*, adhkar_blocks(*)').eq('litany_id', session.litany_id).order('order_index');
            document.getElementById('main-nav').classList.add('hidden');
            showPage('player');
            const view = document.getElementById('player-view');
            view.innerHTML = '';

            if (session.mode === 'flow') {
                data.forEach((item, bIdx) => {
                    for(let i=1; i <= item.user_count; i++) {
                        const row = document.createElement('div'); row.className = 'dhikr-row';
                        row.dataset.idx = bIdx; row.dataset.cnt = i;
                        row.innerHTML = `<div class="arabic">${item.adhkar_blocks.arabic}</div><div style="opacity:0.4">${i}/${item.user_count}</div><small style="opacity:0.3">${item.adhkar_blocks.title}</small>`;
                        view.appendChild(row);
                    }
                });
                const obs = new IntersectionObserver((es) => {
                    es.forEach(e => { if(e.isIntersecting) { e.target.classList.add('active'); updateSession(e.target.dataset.idx, e.target.dataset.cnt); } });
                }, { threshold: 0.6 });
                document.querySelectorAll('.dhikr-row').forEach(r => obs.observe(r));
                const resume = [...document.querySelectorAll('.dhikr-row')].find(r => r.dataset.idx == session.current_block_index && r.dataset.cnt == session.current_count);
                if(resume) resume.scrollIntoView();
            } else {
                renderTap(data, session.current_block_index, session.current_count);
            }
        }

        async function updateSession(idx, cnt) {
            await client.from('litany_sessions').update({ current_block_index: idx, current_count: cnt }).eq('id', activeSession.id);
        }

        async function exitPlayer() {
            document.getElementById('main-nav').classList.remove('hidden');
            showPage('home');
        }

        updateSky(localStorage.getItem('sky_override'));
        loadRoster();
    </script>
</body>
</html>
