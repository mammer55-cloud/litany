<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Litany | Shadhili Zen</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Amiri&display=swap');
        :root { --gold: #f39c12; --glass: rgba(255, 255, 255, 0.08); --bg: #0a0a0c; }
        body { margin: 0; font-family: 'Inter', sans-serif; transition: 1s ease; background: var(--bg); color: white; overflow: hidden; }

        .orb { position: fixed; width: 300px; height: 300px; border-radius: 50%; filter: blur(90px); z-index: -1; opacity: 0.25; animation: float 15s infinite alternate; }
        @keyframes float { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }

        .page { display: none; height: 100vh; overflow-y: auto; padding: 40px 20px 120px 20px; box-sizing: border-box; }
        .page.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; display: flex; background: rgba(30, 30, 30, 0.7); backdrop-filter: blur(25px); padding: 12px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav button { flex: 1; background: none; border: none; color: white; opacity: 0.4; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; cursor: pointer; }
        .nav button.active { opacity: 1; color: var(--gold); }

        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 28px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 10px 40px rgba(0,0,0,0.4); position: relative; }
        .arabic { font-family: 'Amiri', serif; font-size: 2.2rem; direction: rtl; text-align: center; margin: 15px 0; line-height: 1.6; }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 14px; border-radius: 20px; font-weight: 600; width: 100%; cursor: pointer; }

        /* GUI Modal - Enhanced with Dropdown */
        #gui-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; padding: 35px; border-radius: 35px; width: 85%; max-width: 400px; text-align: center; border: 1px solid rgba(243, 156, 18, 0.3); }
        select, input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 15px; width: 100%; margin: 10px 0; font-size: 1rem; box-sizing: border-box; }

        /* Flow Player Styles */
        #player-content { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .dhikr-row { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; scroll-snap-align: center; opacity: 0.15; transition: 0.7s; text-align: center; padding: 30px; box-sizing: border-box; }
        .dhikr-row.active { opacity: 1; transform: scale(1.05); }
        .center-line { position: fixed; top: 50%; left: 10%; width: 80%; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

    <div class="orb" style="background: var(--gold); top: -10%; right: -10%;"></div>
    <div class="orb" style="background: #4834d4; bottom: -10%; left: -10%;"></div>

    <div id="gui-modal">
        <div class="modal-content">
            <h2 style="font-weight: 200; color: var(--gold); margin-top: 0;">Add to Roster</h2>
            
            <p style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 5px; text-align: left;">Choose existing litany:</p>
            <select id="litany-dropdown"></select>
            
            <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 15px; margin-bottom: 5px; text-align: left;">Or create new:</p>
            <input type="text" id="litany-name-new" placeholder="Enter new name...">
            
            <input type="number" id="litany-count" placeholder="Goal count (e.g., 99)">
            
            <button class="btn-main" id="confirm-add" style="margin-top: 20px;">Confirm Addition</button>
            <button onclick="closeModal()" style="background:none; border:none; color:white; margin-top:15px; opacity:0.5; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <div id="home" class="page active">
        <h1 style="font-weight: 200;">Roster</h1>
        <p id="prayer-status" style="opacity: 0.5; font-size: 0.8rem;">Syncing Lexington sun...</p>
        <div id="roster-list"></div>
    </div>

    <div id="shop" class="page">
        <h1 style="font-weight: 200;">Shop</h1>
        <div id="shop-list"></div>
    </div>

    <div id="player" class="page" style="padding: 0; background: black;">
        <div class="center-line" id="line-visual" style="display:none;"></div>
        <div id="player-content"></div>
    </div>

    <nav class="nav">
        <button id="nav-home" class="active" onclick="showPage('home')">Roster</button>
        <button id="nav-shop" onclick="showPage('shop')">Shop</button>
    </nav>

    <script>
        const SB_URL = "https://qtmbkihjgdtdzjafcpji.supabase.co";
        const SB_KEY = "sb_publishable_v2c41Jbqj-xNtdLMdM__zA_zYc5iQxb";
        const client = supabase.createClient(SB_URL, SB_KEY);
        let selectedBlockId = null;

        async function init() { applyPrayerTheme(); loadRoster(); }

        async function applyPrayerTheme() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=2`);
                const { data } = await res.json();
                const now = new Date();
                const h = now.getHours().toString().padStart(2,'0'), m = now.getMinutes().toString().padStart(2,'0');
                const timeStr = `${h}:${m}`;
                const isDay = timeStr >= data.timings.Fajr && timeStr < data.timings.Maghrib;
                document.body.style.background = isDay ? "linear-gradient(to bottom, #FFF9E6, #FFFFFF)" : "#0a0a0c";
                document.body.style.color = isDay ? "#2d3436" : "#f1f2f6";
                document.getElementById('prayer-status').innerText = isDay ? `Day: Maghrib at ${data.timings.Maghrib}` : `Night: Fajr at ${data.timings.Fajr}`;
            });
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'home') loadRoster(); else if(id === 'shop') loadShop();
            document.getElementById('line-visual').style.display = 'none';
        }

        async function loadShop() {
            const { data } = await client.from('adhkar_blocks').select('*');
            document.getElementById('shop-list').innerHTML = data.map(item => `
                <div class="card">
                    <div class="arabic">${item.arabic}</div>
                    <div style="font-size:0.8rem; opacity:0.6; text-align:center;">${item.title}</div>
                    <button class="btn-main" style="margin-top:15px;" onclick="openModal('${item.id}')">Add to Roster</button>
                </div>
            `).join('');
        }

        async function openModal(id) { 
            selectedBlockId = id; 
            const { data } = await client.from('litanies').select('name');
            const dropdown = document.getElementById('litany-dropdown');
            dropdown.innerHTML = `<option value="">-- Create New Below --</option>` + 
                data.map(l => `<option value="${l.name}">${l.name}</option>`).join('');
            document.getElementById('gui-modal').style.display = 'flex'; 
        }

        function closeModal() { document.getElementById('gui-modal').style.display = 'none'; }

        document.getElementById('confirm-add').onclick = async () => {
            const existing = document.getElementById('litany-dropdown').value;
            const manual = document.getElementById('litany-name-new').value;
            const litName = existing || manual || "Daily";
            const count = parseInt(document.getElementById('litany-count').value) || 33;

            let { data: lit } = await client.from('litanies').select('id').eq('name', litName).single();
            if(!lit) {
                const { data: nLit } = await client.from('litanies').insert({ name: litName }).select().single();
                lit = nLit;
            }
            await client.from('litany_structure').insert({ litany_id: lit.id, block_id: selectedBlockId, user_count: count });
            closeModal();
            showPage('home');
        };

        async function loadRoster() {
            const { data } = await client.from('litanies').select('id, name, litany_structure(id, user_count, adhkar_blocks(*))');
            document.getElementById('roster-list').innerHTML = data.map(lit => `
                <div class="card">
                    <h2 style="font-weight:200; margin:0 0 15px 0;">${lit.name}</h2>
                    <div style="display:flex; gap:12px;">
                        <button class="btn-main" onclick="startFlow('${lit.id}')">🌊 Flow Mode</button>
                        <button class="btn-main" style="background:rgba(255,255,255,0.08); color:white;" onclick="startTap('${lit.id}')">👆 Tap Mode</button>
                    </div>
                </div>
            `).join('');
        }

        async function startFlow(id) {
            const { data } = await client.from('litany_structure').select('order_index, user_count, adhkar_blocks(*)').eq('litany_id', id).order('order_index');
            showPage('player');
            document.getElementById('line-visual').style.display = 'block';
            const container = document.getElementById('player-content');
            container.innerHTML = ''; 
            
            data.forEach(item => {
                for(let i=1; i <= item.user_count; i++) {
                    const row = document.createElement('div');
                    row.className = 'dhikr-row';
                    row.innerHTML = `<div class="arabic">${item.adhkar_blocks.arabic}</div><div style="opacity:0.4; font-size:0.8rem;">${i} / ${item.user_count}</div><div style="opacity:0.3; font-size:0.6rem; margin-top:5px;">${item.adhkar_blocks.title}</div>`;
                    container.appendChild(row);
                }
            });

            // Set up Observer for the new rows
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => { if(e.isIntersecting) { e.target.classList.add('active'); if(navigator.vibrate) navigator.vibrate(15); } else e.target.classList.remove('active'); });
            }, { threshold: 0.6 });
            document.querySelectorAll('.dhikr-row').forEach(r => obs.observe(r));
        }

        async function startTap(id) {
            const { data } = await client.from('litany_structure').select('order_index, user_count, adhkar_blocks(*)').eq('litany_id', id).order('order_index');
            let idx = 0, count = 1;
            showPage('player');
            const render = () => {
                const item = data[idx];
                document.getElementById('player-content').innerHTML = `
                    <div class="dhikr-row active" style="height:100vh" onclick="tap()">
                        <div style="opacity:0.5; font-size:0.7rem; margin-bottom:10px;">${item.adhkar_blocks.title}</div>
                        <div class="arabic">${item.adhkar_blocks.arabic}</div>
                        <div style="font-size:6rem; font-weight:100; margin:20px 0;">${count}</div>
                        <p style="opacity:0.4; font-size:0.8rem;">Tap anywhere to count (${count}/${item.user_count})</p>
                    </div>`;
            };
            window.tap = () => {
                if(count >= data[idx].user_count) { count = 1; idx++; if(idx >= data.length) { alert("Mubarak! Completed."); showPage('home'); return; } } else count++;
                if(navigator.vibrate) navigator.vibrate(25);
                render();
            };
            render();
        }

        init();
    </script>
</body>
</html>
