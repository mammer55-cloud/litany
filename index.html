<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Litany</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="mode-night">

    <div class="orb orb-sun"  id="orb-sun"></div>
    <div class="orb orb-moon" id="orb-moon"></div>

    <!-- Home Screen -->
    <div id="screen-home" class="screen active">
        <div class="screen-inner">
            <div class="screen-header">
                <h1 class="page-title">My Litanies</h1>
                <button class="btn-icon" id="btn-new-litany" aria-label="New litany">+ New</button>
            </div>
            <p id="prayer-status" class="prayer-status">Connecting…</p>
            <div id="resume-banner"></div>
            <div id="roster-list"></div>
        </div>
    </div>

    <!-- Explore Screen -->
    <div id="screen-explore" class="screen">
        <div class="screen-inner">
            <div class="screen-header">
                <h1 class="page-title">Explore</h1>
            </div>
            <div id="explore-list"></div>
        </div>
    </div>

    <!-- History Screen -->
    <div id="screen-history" class="screen">
        <div class="screen-inner">
            <div class="screen-header">
                <h1 class="page-title">Sessions</h1>
            </div>
            <div id="history-list"></div>
        </div>
    </div>

    <!-- Player Screen -->
    <div id="screen-player" class="screen player-screen">
        <div class="center-line"></div>
        <div id="player-view"></div>
        <button id="btn-exit-player" class="btn-exit" aria-label="Exit player">✕</button>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay">

        <!-- New Litany -->
        <div id="modal-new-litany" class="bottom-modal" role="dialog" aria-label="New Litany">
            <h2 class="modal-heading">New Litany</h2>
            <input type="text" id="new-litany-name" class="modal-input" placeholder="Name (e.g. Morning Wird)" />
            <input type="text" id="new-litany-desc" class="modal-input" placeholder="Description (optional)" />
            <div class="modal-actions">
                <button class="btn-play btn-secondary" id="modal-new-litany-cancel">Cancel</button>
                <button class="btn-play" id="modal-new-litany-confirm">Create</button>
            </div>
        </div>

        <!-- Add Block to Litany -->
        <div id="modal-add-block" class="bottom-modal" role="dialog" aria-label="Add Block">
            <h2 class="modal-heading" id="add-block-title">Add to Litany</h2>
            <select id="add-block-litany-select" class="modal-input modal-select"></select>
            <input type="number" id="add-block-count" class="modal-input" placeholder="Count (e.g. 33)" min="1" value="33" />
            <div class="modal-actions">
                <button class="btn-play btn-secondary" id="modal-add-block-cancel">Cancel</button>
                <button class="btn-play" id="modal-add-block-confirm">Add</button>
            </div>
        </div>

        <!-- Manage Blocks -->
        <div id="modal-manage-blocks" class="bottom-modal bottom-modal-tall" role="dialog" aria-label="Manage Blocks">
            <h2 class="modal-heading" id="manage-blocks-title">Blocks</h2>
            <div id="manage-blocks-list"></div>
            <div class="modal-actions" style="margin-top:16px">
                <button class="btn-play btn-secondary" id="modal-manage-blocks-close">Done</button>
            </div>
        </div>

        <!-- Confirm Delete -->
        <div id="modal-confirm-delete" class="bottom-modal" role="dialog" aria-label="Confirm Delete">
            <h2 class="modal-heading">Delete Litany?</h2>
            <p class="modal-body-text" id="confirm-delete-text"></p>
            <div class="modal-actions">
                <button class="btn-play btn-secondary" id="modal-confirm-delete-cancel">Cancel</button>
                <button class="btn-play btn-danger" id="modal-confirm-delete-confirm">Delete</button>
            </div>
        </div>

    </div>

    <!-- Bottom Navigation -->
    <nav class="nav" id="main-nav" aria-label="Main navigation">
        <button data-screen="home"    class="nav-btn active">Litanies</button>
        <button data-screen="explore" class="nav-btn">Explore</button>
        <button data-screen="history" class="nav-btn">History</button>
    </nav>

    <div id="app-toast" role="status" aria-live="polite"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
