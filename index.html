<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Litany</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="mode-night">

    <div class="orb orb-sun"  id="orb-sun"></div>
    <div class="orb orb-moon" id="orb-moon"></div>

    <!-- Intent Modal -->
    <div id="intent-modal">
        <div class="intent-box">
            <h2 id="intent-title" class="intent-heading">Launch Litany</h2>
            <p class="intent-sub">Select your session intent</p>

            <div class="intent-grid" id="intent-options"></div>

            <div id="resume-section" class="resume-section hidden">
                <p class="resume-label">Unfinished Session Found</p>
                <button class="btn-play btn-resume-style" id="btn-resume">Resume Progress</button>
            </div>

            <div class="intent-actions">
                <button class="btn-play" id="btn-start-flow">Flow</button>
                <button class="btn-play btn-secondary" id="btn-start-tap">Tap</button>
            </div>
            <button class="btn-cancel" id="btn-cancel-intent">Cancel</button>
        </div>
    </div>

    <!-- New Litany Modal -->
    <div id="new-litany-modal" class="bottom-modal-overlay">
        <div class="bottom-modal">
            <h2 class="modal-heading">New Litany</h2>
            <input type="text" id="new-litany-name" class="modal-input" placeholder="Name (e.g. Morning Wird)" />
            <input type="text" id="new-litany-desc" class="modal-input" placeholder="Description (optional)" />
            <div class="modal-actions">
                <button class="btn-play btn-secondary" onclick="closeBottomModal('new-litany-modal')">Cancel</button>
                <button class="btn-play" onclick="createLitany()">Create</button>
            </div>
        </div>
    </div>

    <!-- Add to Litany Modal -->
    <div id="add-modal" class="bottom-modal-overlay">
        <div class="bottom-modal">
            <h2 class="modal-heading" id="add-modal-title">Add to Litany</h2>
            <select id="add-litany-select" class="modal-input modal-select"></select>
            <input type="number" id="add-count" class="modal-input" placeholder="Count (e.g. 33, 99, 100)" min="1" value="33" />
            <div class="modal-actions">
                <button class="btn-play btn-secondary" onclick="closeBottomModal('add-modal')">Cancel</button>
                <button class="btn-play" onclick="confirmAddToLitany()">Add</button>
            </div>
        </div>
    </div>

    <!-- Home Page -->
    <div id="home" class="page active">
        <h1 class="page-title">My Litanies</h1>
        <p id="prayer-status" class="prayer-status">Connecting to sun…</p>
        <button class="btn-new-litany" onclick="openNewLitanyModal()">+ New Litany</button>
        <div id="roster-list"></div>
    </div>

    <!-- Shop Page -->
    <div id="shop" class="page">
        <h1 class="page-title">Shop</h1>
        <p class="prayer-status">Browse adhkar and add to your litanies</p>
        <div id="shop-list"></div>
    </div>

    <!-- Player Page -->
    <div id="player" class="page player-page">
        <div class="center-line"></div>
        <div id="player-view"></div>
        <button id="btn-exit-player" class="btn-exit" aria-label="Exit player">✕</button>
    </div>

    <!-- Bottom Navigation -->
    <nav class="nav" id="main-nav" aria-label="Main navigation">
        <button id="nav-home" class="active" aria-label="My Litanies">Litanies</button>
        <button id="nav-shop" aria-label="Shop">Shop</button>
    </nav>

    <script src="js/app.js"></script>
</body>
</html>
